name: 'Get & cached dependencies'
description: 'Checkout code and cache dependencies'
inputs:
  catching:
    description: 'Whether to cache dependencies'
    required: false
    default: 'true'
outputs:
  used-cache:
    description: 'Whether the cache was used'
    value: ${{ steps.install.outputs.cache }}
runs:
  using: 'composite'
  steps:
     - name: Cache dependencies
       if:  inputs.catching == 'true'
       id: cache
       uses: actions/cache@v4
       with:
          path: node_modules
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
    
     - name: Install dependencies
       id: install
       if: steps.cache.outputs.cache-hit != 'true' || inputs.catching != 'true' 
       run: |
         npm ci
         echo "cache='${{inputs.catching}}'" >> $GITHUB_OUTPUT
       shell: bash